version: "3.8"

services:
  api:
    build: .
    container_name: healthcare-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - SQLITE_DB_PATH=/app/database/audit.db
    volumes:
      - chroma_data:/app/chroma_db
      - sqlite_data:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    container_name: healthcare-agent-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    restart: unless-stopped

volumes:
  chroma_data:
  sqlite_data:
